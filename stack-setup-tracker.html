<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Stack Setup Tracker — MMIT</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>*{box-sizing:border-box;margin:0;padding:0}body{background:#1a1a2e;font-family:'Inter',sans-serif;color:#fff;min-height:100vh;padding:20px}.container{max-width:680px;margin:0 auto}.mmit-header{text-align:center;padding:24px 0 20px;border-bottom:1px solid #3a3a5c;margin-bottom:24px}.mmit-logo{color:#f0c040;font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase}.mmit-header h1{font-size:22px;font-weight:700;margin:8px 0 4px}.module-label{color:#aaaacc;font-size:13px}.mmit-footer{text-align:center;color:#aaaacc;font-size:13px;padding:24px 0;border-top:1px solid #3a3a5c;margin-top:24px}.card{background:#252545;border:1px solid #3a3a5c;border-radius:12px;padding:20px;margin-bottom:16px}.card h2{color:#f0c040;font-size:16px;font-weight:600;margin-bottom:12px}.ci{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid #3a3a5c}.ci:last-child{border-bottom:none}.ci input[type=checkbox]{width:20px;height:20px;accent-color:#f0c040;flex-shrink:0;margin-top:2px}.ci label{font-size:15px;margin-bottom:0}.ci.done label{text-decoration:line-through;color:#aaaacc}.pb{background:#3a3a5c;border-radius:8px;height:12px;margin:12px 0;overflow:hidden}.pf{background:#f0c040;height:100%;border-radius:8px;transition:width .3s}.result{background:#1a1a2e;border:2px solid #f0c040;border-radius:12px;padding:16px;text-align:center;margin:16px 0}.btn{display:inline-block;background:#f0c040;color:#1a1a2e;border:none;border-radius:8px;padding:12px 24px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit}.btn:hover{background:#ffd060}.suc{background:#4caf82;color:#1a1a2e;padding:16px;border-radius:8px;text-align:center;font-weight:600;font-size:16px;display:none;margin:16px 0}</style></head>
<body><div class="container">
<div class="mmit-header"><span class="mmit-logo">MMIT</span><h1>AI Production Stack Setup Tracker</h1><p class="module-label">Module 2 — Your AI Production Stack</p></div>
<div id="tool-content">
<div class="result"><span style="color:#aaaacc;font-size:14px">Overall Progress</span><div class="pb"><div class="pf" id="mainBar" style="width:0%"></div></div><span style="color:#f0c040;font-size:20px;font-weight:700" id="mainPct">0%</span></div>
<div class="card"><h2>🎥 HeyGen Setup</h2><div id="s1"></div></div>
<div class="card"><h2>🔊 ElevenLabs Setup</h2><div id="s2"></div></div>
<div class="card"><h2>📦 iSpring Suite Setup</h2><div id="s3"></div></div>
<div class="card"><h2>⚡ Make.com Setup</h2><div id="s4"></div></div>
<div class="card"><h2>📁 Storage Setup</h2><div id="s5"></div></div>
<div class="suc" id="done">✅ Stack ready. Proceed to Module 3.</div>
<div style="text-align:center;margin-top:16px"><button class="btn" style="background:#3a3a5c;color:#fff" onclick="resetAll()">Reset Progress</button></div>
</div>
<div class="mmit-footer">Part of The AI Training Studio — Available on Whop · mmit</div>
</div>
<script>
const KEY='mmit-stack-tracker';
const sections={
s1:['Account created on Creator plan','Custom avatar uploaded OR studio avatar selected','API key generated and saved to password manager','Test video rendered successfully'],
s2:['Account created on Starter plan','Voice clone created and named per convention','Regulatory term pronunciation test passed','API key generated and saved'],
s3:['iSpring Suite installed (trial or licensed)','PowerPoint plugin verified active','Test SCORM export completed'],
s4:['Account created on Core plan','HeyGen connector tested','ElevenLabs connector tested','Google Drive connector tested'],
s5:['Shared Drive folder structure created (/Scripts /Audio /Video-Raw /SCORM-Final /Archive)','Asset repository accessible to team']
};
let state=JSON.parse(localStorage.getItem(KEY)||'{}');
function render(){let total=0,checked=0;
Object.entries(sections).forEach(([id,items])=>{const el=document.getElementById(id);el.innerHTML='';
items.forEach((txt,i)=>{const k=id+'_'+i;total++;const done=!!state[k];if(done)checked++;
const d=document.createElement('div');d.className='ci'+(done?' done':'');
d.innerHTML=`<input type="checkbox" id="${k}" ${done?'checked':''} onchange="toggle('${k}')"><label for="${k}">${txt}</label>`;
el.appendChild(d);});});
const pct=total?Math.round(checked/total*100):0;
document.getElementById('mainPct').textContent=pct+'%';
document.getElementById('mainBar').style.width=pct+'%';
document.getElementById('done').style.display=pct===100?'block':'none';}
function toggle(k){state[k]=!state[k];if(!state[k])delete state[k];localStorage.setItem(KEY,JSON.stringify(state));render();}
function resetAll(){if(confirm('Reset all progress?')){state={};localStorage.removeItem(KEY);render();}}
render();
</script></body></html>
