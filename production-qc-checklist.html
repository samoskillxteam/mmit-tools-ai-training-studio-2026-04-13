<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Production QC Checklist — MMIT</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>*{box-sizing:border-box;margin:0;padding:0}body{background:#000;font-family:'Plus Jakarta Sans',sans-serif;color:#fff;min-height:100vh;padding:20px;background-image:linear-gradient(rgba(255,255,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.03) 1px,transparent 1px);background-size:80px 80px}.container{max-width:680px;margin:0 auto}.mmit-header{text-align:center;padding:24px 0 20px;border-bottom:1px solid #606060;margin-bottom:24px}.mmit-logo{color:#f0c040;font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase}.mmit-header h1{font-size:22px;font-weight:700;margin:8px 0 4px}.module-label{color:#aaaacc;font-size:13px}.mmit-footer{text-align:center;color:#aaaacc;font-size:13px;padding:24px 0;border-top:1px solid #606060;margin-top:24px}.card{background:#211f1f;border:1px solid #606060;border-radius:12px;padding:20px;margin-bottom:16px;transition:opacity .3s}.card h2{color:#f0c040;font-size:16px;font-weight:600;margin-bottom:4px}.card .sub{color:#aaaacc;font-size:13px;margin-bottom:12px}.ci{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid #606060}.ci:last-child{border-bottom:none}.ci input[type=checkbox]{width:20px;height:20px;accent-color:#f0c040;flex-shrink:0;margin-top:2px}.ci label{font-size:15px;margin-bottom:0}.ci.done label{text-decoration:line-through;color:#aaaacc}.locked{opacity:.35;pointer-events:none}.lock-msg{color:#aaaacc;font-size:12px;text-align:center;padding:8px;font-style:italic}.pb{background:#606060;border-radius:8px;height:10px;margin:8px 0;overflow:hidden}.pf{background:#f0c040;height:100%;border-radius:8px;transition:width .3s}.result{background:#0a0a0a;border:2px solid #f0c040;border-radius:12px;padding:16px;text-align:center;margin:12px 0}.suc{background:#4caf82;color:#0a0a0a;padding:16px;border-radius:8px;text-align:center;font-weight:600;display:none;margin:16px 0}.btn{background:#f0c040;color:#0a0a0a;border:none;border-radius:8px;padding:12px 24px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit}.btn:hover{background:#ffd060}</style></head>
<body><div class="container">
<div class="mmit-header"><span class="mmit-logo">MMIT</span><h1>Production QC Checklist</h1><p class="module-label">Module 4 — Avatar Production Mastery</p></div>
<div class="result"><span style="color:#aaaacc;font-size:14px">Overall QC Progress</span><div class="pb"><div class="pf" id="mainBar" style="width:0%"></div></div><span style="color:#f0c040;font-size:20px;font-weight:700" id="mainPct">0/20</span></div>
<div id="levels"></div>
<div class="suc" id="done">✅ Scene is audit-ready. Advance to SCORM packaging.</div>
<div style="text-align:center;margin-top:16px"><button class="btn" onclick="exportTxt()">Export as Text</button> <button class="btn" style="background:#606060;color:#fff" onclick="resetAll()">Reset</button></div>
<div class="mmit-footer">Part of The AI Training Studio — Available on Whop · mmit</div>
</div>
<script>
const KEY='mmit-qc-checklist';const levels=[{name:'Level 1 — Technical Quality',reviewer:'Producer self-review',items:['Audio is clear, no background noise or artifacts','Video resolution is 1920×1080 minimum','Lip-sync is accurate throughout the scene','No avatar rendering glitches (eye drift, hand artifacts)','Lower third displays correctly with regulatory citation']},{name:'Level 2 — Content Accuracy',reviewer:'SME verification',items:['SME has reviewed and verified all factual claims','All procedure steps are in correct sequence','Terminology is consistent with current practice','No ambiguous language that could mislead learners','SME has signed off in writing']},{name:'Level 3 — Regulatory Alignment',reviewer:'Compliance officer',items:['Compliance officer has reviewed the scene','All regulatory citations verified against current regulation','Language aligns with current regulatory expectations','Scene satisfies the stated learning objective','Compliance officer has signed off in writing']},{name:'Level 4 — Stakeholder Acceptability',reviewer:'Stakeholder gate',items:['Budget holder has reviewed the final cut','Operations lead has reviewed the final cut','Requested revisions completed and documented','Final approval captured in writing with date','Version archived with approval documentation']}];
let state=JSON.parse(localStorage.getItem(KEY)||'{}');function isLevelComplete(li){return levels[li].items.every((_,ii)=>!!state['l'+li+'_'+ii]);}function render(){const el=document.getElementById('levels');el.innerHTML='';let total=0,checked=0;levels.forEach((lv,li)=>{const locked=li>0&&!isLevelComplete(li-1);const div=document.createElement('div');div.className='card'+(locked?' locked':'');let html=`<h2>${lv.name}</h2><div class="sub">Reviewer: ${lv.reviewer}</div>`;if(locked)html+=`<div class="lock-msg">🔒 Complete Level ${li} first</div>`;const lvChecked=lv.items.filter((_,ii)=>!!state['l'+li+'_'+ii]).length;html+=`<div class="pb"><div class="pf" style="width:${Math.round(lvChecked/lv.items.length*100)}%"></div></div>`;lv.items.forEach((txt,ii)=>{const k='l'+li+'_'+ii;total++;const done=!!state[k];if(done)checked++;html+=`<div class="ci${done?' done':''}"><input type="checkbox" id="${k}" ${done?'checked':''} ${locked?'disabled':''} onchange="toggle('${k}')"><label for="${k}">${txt}</label></div>`;});div.innerHTML=html;el.appendChild(div);});document.getElementById('mainPct').textContent=checked+'/'+total;document.getElementById('mainBar').style.width=Math.round(checked/total*100)+'%';document.getElementById('done').style.display=checked===total?'block':'none';}
function toggle(k){state[k]=!state[k];if(!state[k])delete state[k];localStorage.setItem(KEY,JSON.stringify(state));render();}function resetAll(){if(confirm('Reset all QC progress?')){state={};localStorage.removeItem(KEY);render();}}function exportTxt(){let txt='MMIT Production QC Checklist — Export\n'+new Date().toISOString()+'\n\n';levels.forEach((lv,li)=>{txt+=lv.name+' ('+lv.reviewer+')\n';lv.items.forEach((item,ii)=>{txt+=(state['l'+li+'_'+ii]?'[✓]':'[ ]')+' '+item+'\n';});txt+='\n';});const b=new Blob([txt],{type:'text/plain'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='qc-checklist-export.txt';a.click();}render();
</script></body></html>
